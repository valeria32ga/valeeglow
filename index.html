<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vale Diary</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #000;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    /* PERFIL */
    .perfil {
      display: flex;
      align-items: center;
      padding: 20px;
      gap: 15px;
    }

    .perfil img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }


    .info h1 {

      .info h1 {
  font-size: 38px; /* más grande */
  font-family: Georgia, 'Times New Roman', serif;
  font-weight: normal;
  letter-spacing: 1px;
  margin: 0;
}
}
    .botones {
      margin-top: 8px;
    }

    .follow {
      background: black;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      margin-right: 8px;
    }

    .more {
      background: #eee;
      border: none;
      padding: 8px 12px;
      border-radius: 50%;
    }

    /* LINEA */
    .linea {
      height: 1px;
      background: #ddd;
      margin: 10px 0;
    }

    /* TITULO */
    .titulo {
      padding: 10px 15px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    /* GALERÍA TIPO VSCO */
   .galeria {
  column-count: 2;
  column-gap: 21px; /* espacio horizontal */
  padding: 10px;
}

   .galeria img {
  width: 100%;
  margin-bottom: 30px; /* espacio entre imágenes */
  border-radius: 9px;
}
.galeria img:active {
  transform: scale(0.97);
}

    /* RESPONSIVE */
    @media (min-width: 700px) {
      .galeria {
        column-count: 3;
      }
    }
    .topbar-black {
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  font-size: 14px;
}

.close {
  font-size: 18px;
}

.footer {
  text-align: center;
  padding: 30px 15px;
  border-top: 1px solid #f2dede;
  background: #fff0f5; /* rosa muy suave */
}

.marca {
  font-family: Georgia, serif;
  font-size: 16px;
  color: #d48fa6;
  margin-bottom: 10px;
}

/* ICONOS */
.apps {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 20px;
  margin: 10px 0;
}

.apps a {
  color: #d48fa6;
  transition: 0.3s;
}

.apps a:hover {
  color: #ff6fa5;
  transform: scale(1.2);
}

/* TEXTO ABAJO */
.sub {
  font-size: 12px;
  color: #b57c90;
  letter-spacing: 1px;
}
  </style>

</head>
<button onclick="abrirMenu()">☰</button>

<body>
  <div class="topbar-black">
    <i class="fa-solid fa-xmark"></i>
    <span>vsco.co / valediary</span>
  
    <div class="icons">
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-solid fa-bars"></i>
    </div>
  </div>



  <!-- PERFIL -->
  <div class="perfil">
    <img src="imagenes/img log.png">

    <div class="info">
      <h1>Valeria</h1>
      <p class="descripcion">Espacio creativo & visual</p>
    </div>
      

      <div class="botones">
        <button class="follow">FOLLOW</button>
        <button class="more">•••</button>
      </div>
    </div>
  </div>

  <div class="linea"></div>

  <div class="titulo">RECENT</div>

  <!-- GALERÍA -->
  <div class="galeria">
    <img src="imagenes/img2.png">
    <img src="imagenes/img3.png">
    <img src="imagenes/img4.png">
    <img src="imagenes/img11.png">
    <img src="imagenes/img12.png">
    <img src="imagenes/img.png">
    <img src="imagenes/img9.png">
    <img src="imagenes/img6.png">
    <img src="imagenes/img10.png">
  </div>


  <footer class="footer">
  
    <p class="marca">Valeria Glow ✨</p>
  
    <div class="apps">
    <a href="valeria__joss"><i class="fab fa-instagram"></i></a>
    <a href="valeria zambrano"><i class="fab fa-facebook"></i></a>
    <a href=""><i class="fab fa-pinterest"></i></a>
    <a href=""><i class="fab fa-snapchat"></i></a>
    <a href=""> <i class="fab fa-youtube"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
    </div>
  
    <p class="sub">aesthetic glow · 2026</p>
  
  </footer>
</body>

</html>
